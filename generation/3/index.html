<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designed By Committee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* ── Base reset & layout ── */
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
    }

    /* Main tagline */
    .main-text {
      position: relative;
      display: inline-block;
      font-family: 'Roboto', sans-serif;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: #111111;
      text-transform: uppercase;
      margin: 0;
      animation:
        fadeSlideIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) both,
        breathe 6s ease-in-out 1.3s infinite;
    }

    /* Underline reveal on hover */
    .main-text::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: #111111;
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .main-text:hover::after {
      width: 100%;
    }

    /* Entrance: fade up into place */
    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Ongoing: very gentle letter-spacing breathe */
    @keyframes breathe {
      0%, 100% {
        letter-spacing: 0.15em;
      }
      50% {
        letter-spacing: 0.22em;
      }
    }

    /* ── ASCII cat stage ── */

    /* Full-width strip pinned to the bottom of the viewport */
    .cat-stage {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      pointer-events: none;
      overflow: hidden;
    }

    /* The sprite; JS moves it via `left` */
    .cat-sprite {
      position: absolute;
      bottom: 8px;
      left: -160px;
      margin: 0;
      padding: 0;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.75rem;
      line-height: 1.25;
      color: #111111;
      white-space: pre;
      user-select: none;
      opacity: 0;
      animation: catFadeIn 0.6s ease 0.5s forwards;
    }

    @keyframes catFadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <p class="main-text">This website is designed by committee</p>
  <div class="cat-stage" aria-hidden="true">
    <pre class="cat-sprite" id="catSprite"></pre>
  </div>
  <script>
    (function () {
      // Two ASCII frames alternate to animate the legs
      var catFrames = [
        // Frame A - legs position 1
        "  /\_____/\\  \n" +
        " ( ^w^    )-' \n" +
        "  |      |    \n" +
        "  | |  | |    \n" +
        " (_/    \_)   ",

        // Frame B - legs position 2
        "  /\_____/\\  \n" +
        " ( ^w^    )-' \n" +
        "  |      |    \n" +
        "  |_|  |_|    \n" +
        " (_/    \_)   "
      ];

      var sprite = document.getElementById('catSprite');
      if (!sprite) return;

      var SPEED       = 1.8;   // px per rAF tick
      var FRAME_RATE  = 8;     // swap ASCII art every N ticks (~133ms at 60fps)
      var OFFSCREEN_L = -150;  // starting x (off-screen left)

      var posX       = OFFSCREEN_L;
      var frameIndex = 0;
      var tickCount  = 0;

      function getLoopBoundary() {
        return window.innerWidth + 160;
      }

      function tick() {
        posX += SPEED;

        tickCount++;
        if (tickCount % FRAME_RATE === 0) {
          frameIndex = (frameIndex + 1) % catFrames.length;
        }

        sprite.textContent = catFrames[frameIndex];
        sprite.style.left  = posX + 'px';

        if (posX > getLoopBoundary()) {
          posX = OFFSCREEN_L;
        }

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    })();
  </script>

</html>
