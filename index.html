<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Designed By Committee — History</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0a0a0a;color:#f0f0f0;font-family:ui-monospace,'Cascadia Code',monospace;padding:40px 24px}
  h1{font-size:18px;margin:0 0 40px;color:#e8ff00}
  .item{display:flex;gap:0;margin-bottom:0}
  .spine{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0;padding-top:3px}
  .dot{width:10px;height:10px;border-radius:50%;background:#333;border:2px solid #555;flex-shrink:0;transition:border-color 0.2s,background 0.2s}
  .line{width:1px;background:#222;flex:1;min-height:24px}
  .item:last-child .line{background:transparent}
  .card{display:block;flex:1;max-width:640px;border:1px solid #222;padding:20px 24px;margin-bottom:24px;text-decoration:none;color:inherit;transition:border-color 0.2s}
  .card:hover{border-color:#555}
  .item:hover .dot{background:#e8ff00;border-color:#e8ff00}
  .gen{font-size:11px;color:#888;margin-bottom:8px}
  .suggestion{font-size:15px;margin-bottom:10px;color:#f0f0f0}
  .meta{font-size:11px;color:#555}
</style>
</head>
<body>
<h1>✦ Designed By Committee — Evolution History</h1>

    <div class="item">
      <div class="spine">
        <div class="dot"></div>
        <div class="line"></div>
      </div>
      <a class="card" href="/generation/1/">
        <div class="gen">Gen 4 &middot; Evo 1</div>
        <div class="suggestion">&ldquo;change the font to google roboto&rdquo;</div>
        <div class="meta">8 votes &middot; daily_cron &middot; Wed, 06 May 2026 03:05:06 GMT</div>
      </a>
    </div>
</body>
</html>
